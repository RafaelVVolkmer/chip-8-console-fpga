suite: coverage_policy
thresholds:
  - scope: cpu_core
    line: 90
    branch: 85
    fsm_states: 100
    functional: 100
  - scope: soc_axi
    csr_reset: 100
    csr_access_classes: 100
    invalid_access: 100
    backpressure: 100
  - scope: video
    draw_aligned: 100
    draw_unaligned: 100
    wrap: 100
    collision: 100
    clear: 100
waivers:
  - signal: debug_reserved_o
    reason: reserved for future DAP extension
    approved_by: Rafael
    status: active
