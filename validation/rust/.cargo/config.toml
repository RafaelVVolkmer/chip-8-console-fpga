[alias]
build-release = "build --workspace --all-targets --release"
check-all = "check --workspace --all-targets --all-features"
clippy-all = "clippy --workspace --all-targets --all-features -- -D warnings"
doc-strict = "doc --workspace --no-deps"
test-release = "test --workspace --all-targets --release"
