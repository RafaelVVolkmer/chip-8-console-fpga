# Local-only aggressive build profile.
# Usage:
#   cargo +nightly rustc --release -p chip8-model --lib \
#       --config .cargo/nightly-aggressive.toml --crate-type staticlib
#
# This file intentionally stays out of the default Cargo configuration because
# the -Z options require nightly and target-cpu=native is not reproducible
# across GitHub-hosted runners or different developer machines.
# VFE requires LTO and is valid for final artifacts such as staticlib, not for
# the rlib that Cargo builds for Rust-side unit tests and binaries.
[build]
rustflags = [
  "-C",
  "target-cpu=native",
  "-C",
  "prefer-dynamic=no",
  "-C",
  "force-frame-pointers=no",
  "-C",
  "lto=fat",
  "-C",
  "linker-features=+lld",
  "-C",
  "link-arg=-Wl,-O2",
  "-C",
  "link-arg=-Wl,--gc-sections",
  "-C",
  "link-arg=-Wl,--as-needed",
  "-C",
  "link-arg=-Wl,--icf=all",
  "-Z",
  "unstable-options",
  "-Z",
  "tune-cpu=native",
  "-Z",
  "mir-opt-level=4",
  "-Z",
  "merge-functions=aliases",
  "-Z",
  "virtual-function-elimination",
]
