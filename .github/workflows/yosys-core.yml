name: Yosys Core

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  yosys-core:
    name: Core synthesis check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Yosys
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y yosys

      - name: Run core Yosys check
        run: make yosys
