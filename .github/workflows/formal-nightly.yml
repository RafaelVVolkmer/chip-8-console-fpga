---
name: Formal nightly

on:
  schedule:
    - cron: '11 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: formal-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  formal-nightly:
    name: SymbiYosys formal regression
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install formal tools
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y yosys symbiyosys boolector

      - name: Run formal regression
        run: make ci-formal-nightly

      - name: Upload formal artifacts
        uses: actions/upload-artifact@v4
        with:
          name: formal-nightly-artifacts
          path: |
            validation/formal/**/PASS
            validation/formal/**/status
            validation/formal/**/logfile.txt
            reports/validation
