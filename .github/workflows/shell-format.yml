---
name: Shell format

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: shell-format-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell-format:
    name: shfmt formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install shfmt
        run: go install mvdan.cc/sh/v3/cmd/shfmt@v3.10.0

      - name: Run shfmt check
        run: make lint-shfmt
