---
name: YAML lint

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: yaml-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  yaml-lint:
    name: YAML syntax and style
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yamllint
        run: python -m pip install --disable-pip-version-check 'yamllint==1.38.0'

      - name: Run yamllint
        run: yamllint .github/workflows .markdownlint.yml .yamllint.yml
