---
name: Rust engine

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rust-engine-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-engine:
    name: Rust validation engine run
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: validation/rust

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run validation engine
        run: cargo run -q -p chip8-model --bin chip8-model -- 1024
