name: Verilator Core

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verilator-core:
    name: Core RTL and core testbench lint
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      VERILATOR_VERSION: v5.048
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Verilator
        uses: actions/cache@v4
        with:
          path: ~/.local/verilator-${{ env.VERILATOR_VERSION }}
          key: verilator-${{ runner.os }}-${{ env.VERILATOR_VERSION }}

      - name: Install Verilator
        run: scripts/ci/install_verilator.sh

      - name: Run core Verilator lint
        run: make lint-verilator-core
