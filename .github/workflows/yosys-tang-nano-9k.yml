name: Yosys Tang Nano 9K

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  yosys-tang-nano-9k:
    name: Tang Nano 9K synthesis check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Yosys
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y yosys

      - name: Run Tang Nano 9K Yosys check
        run: make tang-nano-9k-check
