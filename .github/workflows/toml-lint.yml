---
name: TOML lint

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: toml-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  toml-lint:
    name: TOML syntax and formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Taplo
        run: cargo install taplo-cli --locked

      - name: Run Taplo checks
        run: make lint-toml
