name: Yosys SoC AXI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  yosys-soc-axi:
    name: AXI SoC synthesis check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Yosys
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y yosys

      - name: Run AXI SoC Yosys check
        run: yosys -q scripts/verification/yosys_soc_axi_check.ys
