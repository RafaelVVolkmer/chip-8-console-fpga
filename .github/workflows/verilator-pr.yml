---
name: Verilator PR

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verilator-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verilator-pr:
    name: PR RTL simulation and traceability
    runs-on: ubuntu-latest
    timeout-minutes: 70
    env:
      VERILATOR_VERSION: v5.048

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Verilator
        uses: actions/cache@v4
        with:
          path: ~/.local/verilator-${{ env.VERILATOR_VERSION }}
          key: verilator-${{ runner.os }}-${{ env.VERILATOR_VERSION }}

      - name: Install Yosys
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y yosys

      - name: Install Verilator
        run: scripts/ci/install_verilator.sh

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: validation/rust -> target

      - name: Run PR regression
        run: make ci-verilator-pr

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: verilator-pr-validation-report
          path: reports/validation
