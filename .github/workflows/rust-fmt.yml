---
name: Rust fmt

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rust-fmt-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-fmt:
    name: Rust formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: validation/rust

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Run rustfmt
        run: cargo fmt --all --check
